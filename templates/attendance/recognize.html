{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto w-full flex flex-col items-center">
    
    <!-- Premium Header -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-emerald-50 text-emerald-600 mb-4 shadow-inner border border-emerald-100">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
        </div>
        <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Mark Attendance</h1>
        <p class="mt-3 text-base text-slate-500 max-w-sm mx-auto">Please look directly at the camera to automatically verify your identity.</p>
    </div>

    <!-- Scanner Card -->
    <div class="w-full bg-white/80 backdrop-blur-xl rounded-[2.5rem] p-6 sm:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-white/60 text-center relative z-20">
        
        <div id="alertBox" class="alert hidden"></div>

        <!-- Video Container -->
        <div id="videoContainer" class="relative w-full max-w-sm mx-auto aspect-square rounded-[2rem] overflow-hidden shadow-2xl bg-black border-[6px] border-transparent transition-colors duration-300">
            <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
            <canvas id="canvas" class="hidden"></canvas>
            
            <!-- Scanning Graphics -->
            <div id="scanOverlay" class="absolute inset-0 pointer-events-none opacity-50 flex items-center justify-center">
                <!-- Outer Ring -->
                <div class="absolute w-5/6 h-5/6 border border-white/30 rounded-full animate-[spin_10s_linear_infinite]"></div>
                <!-- Inner Reticle box -->
                <div class="w-3/4 h-3/4 border-2 border-brand-400 rounded-3xl relative">
                    <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-white rounded-tl-2xl"></div>
                    <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-white rounded-tr-2xl"></div>
                    <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-white rounded-bl-2xl"></div>
                    <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-white rounded-br-2xl"></div>
                </div>
                <!-- Scanning Line -->
                <div class="absolute w-full h-1 bg-brand-400/80 shadow-[0_0_15px_rgba(99,102,241,1)] animate-[pulse_2s_ease-in-out_infinite]" style="top:50%;"></div>
            </div>
        </div>

        <div class="mt-10">
            <button id="startBtn" class="w-full sm:w-2/3 mx-auto flex items-center justify-center gap-2 px-8 py-4 rounded-2xl shadow-lg shadow-brand-500/30 text-lg font-bold text-white bg-gradient-to-r from-brand-600 to-purple-600 hover:from-brand-500 hover:to-purple-500 transition-all hover:-translate-y-1 active:translate-y-0">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Commence Scan
            </button>
            <button id="stopBtn" class="hidden w-full sm:w-2/3 mx-auto flex items-center justify-center gap-2 px-8 py-4 rounded-2xl shadow-md text-lg font-bold text-slate-700 bg-slate-100 hover:bg-slate-200 transition-all active:scale-95">
                <svg class="w-6 h-6 text-rose-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>
                Abort Scan
            </button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const videoContainer = document.getElementById('videoContainer');
    const scanOverlay = document.getElementById('scanOverlay');
    
    let isScanning = false;
    let scanInterval;

    // Access webcam
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            Swal.fire({
                icon: 'error',
                title: 'Camera Error',
                text: 'Camera access denied or unavailable.',
                buttonsStyling: false,
                customClass: { popup: 'rounded-3xl', confirmButton: 'bg-rose-600 text-white hover:bg-rose-700 rounded-xl px-8 py-3 font-bold shadow-lg transition-colors' }
            });
            console.error(err);
        });

    async function processFrame() {
        if (!isScanning) return;

        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL('image/jpeg');

        try {
            const response = await fetch('/api/recognize_face/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });

            const data = await response.json();
            
            // If the user cancelled the scan while fetch was in-flight, ignore
            if (!isScanning) return;
            
            if (data.status === 'success') {
                videoContainer.style.borderColor = '#10b981'; // green
                stopScanning();
                
                Swal.fire({
                    icon: 'success',
                    title: 'Verified',
                    text: data.message,
                    timer: 2500,
                    showConfirmButton: false,
                    customClass: { popup: 'rounded-2xl' }
                }).then(() => {
                    videoContainer.style.borderColor = 'transparent';
                    startScanning();
                });

            } else if (data.status === 'warning') {
                videoContainer.style.borderColor = '#f59e0b'; // orange
                stopScanning();
                
                Swal.fire({
                    icon: 'info',
                    title: 'Already Marked',
                    text: data.message,
                    timer: 2500,
                    showConfirmButton: false,
                    customClass: { popup: 'rounded-2xl' }
                }).then(() => {
                    videoContainer.style.borderColor = 'transparent';
                    startScanning();
                });

            } else {
                // error / unknown person
                if (data.message === 'Unknown person' || data.message === 'No registered students found') {
                    videoContainer.style.borderColor = '#ef4444'; // red
                    stopScanning();
                    Swal.fire({
                        icon: 'error',
                        title: 'Face Not Recognized',
                        text: 'Please register first before marking attendance.',
                        confirmButtonText: 'Go to Registration',
                        buttonsStyling: false,
                        allowOutsideClick: false,
                        customClass: {
                            popup: 'rounded-3xl',
                            confirmButton: 'bg-rose-600 text-white hover:bg-rose-700 rounded-xl px-8 py-3 font-bold shadow-lg transition-colors'
                        }
                    }).then(() => {
                        window.location.href = "{% url 'register' %}";
                    });
                }
                // Silently ignore "No face found in image" rather than throwing alerts to keep UI clean
            }
        } catch (err) {
            console.error(err);
        }
    }

    function startScanning() {
        if (isScanning) return; // Prevent duplicate triggers!
        isScanning = true;
        
        startBtn.classList.add('hidden');
        stopBtn.classList.remove('hidden');
        startBtn.classList.remove('flex');
        stopBtn.classList.add('flex');
        
        videoContainer.style.borderColor = 'transparent';
        scanOverlay.classList.remove('hidden');
        
        // Clear any lingering intervals just in case
        if (scanInterval) clearInterval(scanInterval);
        scanInterval = setInterval(processFrame, 1500);
    }

    function stopScanning() {
        isScanning = false;
        
        startBtn.classList.remove('hidden');
        stopBtn.classList.add('hidden');
        startBtn.classList.add('flex');
        stopBtn.classList.remove('flex');
        scanOverlay.classList.add('hidden');
        
        if (scanInterval) clearInterval(scanInterval);
    }

    startBtn.addEventListener('click', startScanning);
    stopBtn.addEventListener('click', () => {
        stopScanning();
        videoContainer.style.borderColor = 'transparent';
    });
</script>
{% endblock %}
