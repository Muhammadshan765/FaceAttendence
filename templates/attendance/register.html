{% extends 'base.html' %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
    .error-text {
        color: #dc2626;
        font-size: 0.85rem;
        text-align: left;
        margin-top: -0.5rem;
        margin-bottom: 1rem;
        display: none;
    }
</style>
<div class="card" style="max-width: 600px; margin: 0 auto; text-align: center;">
    <h2>Register New Student</h2>
    
    <div id="alertBox" class="alert"></div>

    <div style="margin-bottom: 1.5rem; text-align: left;">
        <label for="studentId" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Student ID</label>
        <input type="text" id="studentId" placeholder="e.g. CS123" 
               style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 1rem;">
        <div id="studentIdError" class="error-text">Student ID is required</div>
               
        <label for="studentYear" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Year</label>
        <select id="studentYear" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 1rem;">
            <option value="">Select Year</option>
            <option value="1st Year">1st Year</option>
            <option value="2nd Year">2nd Year</option>
            <option value="3rd Year">3rd Year</option>
            <option value="4th Year">4th Year</option>
        </select>
        <div id="studentYearError" class="error-text">Year is required</div>

        <label for="studentGender" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Gender</label>
        <select id="studentGender" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 1rem;">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>
        <div id="studentGenderError" class="error-text">Gender is required</div>

        <label for="studentDepartment" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Department</label>
        <select id="studentDepartment" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 1rem;">
            <option value="">Select Department</option>
            <option value="CS">Computer Science</option>
            <option value="IT">Information Technology</option>
            <option value="ECE">Electronics and Communication</option>
            <option value="ME">Mechanical Engineering</option>
            <option value="CE">Civil Engineering</option>
        </select>
        <div id="studentDepartmentError" class="error-text">Department is required</div>

        <label for="studentName" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Student Name</label>
        <input type="text" id="studentName" placeholder="John Doe" 
               style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 1rem;">
        <div id="studentNameError" class="error-text">Student Name is required</div>
    </div>

    <div style="position: relative; width: 100%; max-width: 400px; margin: 0 auto 1.5rem auto; border-radius: 8px; overflow: hidden; background: #000; display: inline-block;">
        <video id="webcam" autoplay playsinline style="width: 100%; display: block;"></video>
        <canvas id="canvas" style="display: none;"></canvas>
    </div>

    <div>
        <button id="captureBtn" class="btn btn-primary" style="width: 100%;">Capture Face & Register</button>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const studentNameInput = document.getElementById('studentName');
    const studentIdInput = document.getElementById('studentId');
    const studentYearSelect = document.getElementById('studentYear');
    const studentGenderSelect = document.getElementById('studentGender');
    const studentDepartmentSelect = document.getElementById('studentDepartment');
    const alertBox = document.getElementById('alertBox');

    // Access webcam
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            showAlert('error', 'Camera access denied or unavaliable.');
            console.error(err);
        });

    function showAlert(type, message) {
        alertBox.className = `alert ${type}`;
        alertBox.textContent = message;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    captureBtn.addEventListener('click', async () => {
        const name = studentNameInput.value.trim();
        const studentId = studentIdInput.value.trim();
        const year = studentYearSelect.value;
        const gender = studentGenderSelect.value;
        const department = studentDepartmentSelect.value;

        let isValid = true;
        document.querySelectorAll('.error-text').forEach(el => el.style.display = 'none');

        if (!studentId) {
            document.getElementById('studentIdError').style.display = 'block';
            isValid = false;
        }
        if (!year) {
            document.getElementById('studentYearError').style.display = 'block';
            isValid = false;
        }
        if (!gender) {
            document.getElementById('studentGenderError').style.display = 'block';
            isValid = false;
        }
        if (!department) {
            document.getElementById('studentDepartmentError').style.display = 'block';
            isValid = false;
        }
        const nameRegex = /^[A-Za-z]+$/;
        const nameErrorEl = document.getElementById('studentNameError');
        if (!name) {
            nameErrorEl.textContent = 'Student Name is required';
            nameErrorEl.style.display = 'block';
            isValid = false;
        } else if (!nameRegex.test(name)) {
            nameErrorEl.textContent = 'Student Name can only contain letters (no spaces allowed)';
            nameErrorEl.style.display = 'block';
            isValid = false;
        }

        if (!isValid) return;

        // Draw video frame to canvas
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Get base64 image
        const imageData = canvas.toDataURL('image/jpeg');

        captureBtn.disabled = true;
        captureBtn.textContent = 'Processing...';
        showAlert('warning', 'Registering face, please wait...');

        try {
            const response = await fetch('/api/register_face/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, student_id: studentId, year: year, gender: gender, department: department, image: imageData })
            });

            const data = await response.json();
            
            if (data.status === 'success') {
                Swal.fire({
                    icon: 'success',
                    title: 'Registration Successful',
                    text: data.message,
                    confirmButtonColor: '#4f46e5'
                }).then(() => {
                    window.location.href = "{% url 'recognize' %}";
                });
            } else {
                showAlert('error', data.message);
            }
        } catch (err) {
            showAlert('error', 'Failed to connect to server');
        } finally {
            captureBtn.disabled = false;
            captureBtn.textContent = 'Capture Face & Register';
        }
    });
</script>
{% endblock %}
